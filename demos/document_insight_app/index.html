<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGroei - Document-to-Insight</title>
    <meta name="description" content="Turn unstructured documents into structured business intelligence.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>TechGroei <span class="badge">Document Intelligence</span></h1>
            </div>
            <p>Automated extraction, classification, and risk detection.</p>
        </header>

        <main class="main-content">
            <section class="upload-panel">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-icon">📂</div>
                    <h3>Drop document here</h3>
                    <p>PDF, DOCX, or Image (Max 10MB)</p>
                    <input type="file" id="file-input" hidden>
                    <button class="btn-outline" onclick="document.getElementById('file-input').click()">Browse Files</button>
                </div>

                <div class="demo-selector">
                    <p>Try a Demo Document:</p>
                    <div class="demo-chips">
                        <button class="chip" data-type="contract">📜 Service Agreement</button>
                        <button class="chip" data-type="cv">👤 Technical CV</button>
                        <button class="chip" data-type="invoice">💰 Complex Invoice</button>
                    </div>
                </div>

                <div class="processing-status" id="processing-status" style="display: none;">
                    <div class="status-header">
                        <span class="status-dot"></span>
                        <span id="status-text">Analyzing document...</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </section>

            <section class="insight-panel">
                <div class="panel-placeholder" id="insight-placeholder">
                    <div class="placeholder-icon">🔍</div>
                    <p>Upload a document to generate structured business insights.</p>
                </div>

                <div class="insight-content" id="insight-content" style="display: none;">
                    <div class="insight-tabs">
                        <button class="tab-btn active" data-tab="summary">Summary</button>
                        <button class="tab-btn" data-tab="entities">Entities</button>
                        <button class="tab-btn" data-tab="risks">Risks & Actions</button>
                        <button class="tab-btn" data-tab="json">JSON</button>
                    </div>

                    <div class="tab-content" id="tab-summary">
                        <!-- Injected -->
                    </div>
                    <div class="tab-content" id="tab-entities" style="display: none;">
                        <!-- Injected -->
                    </div>
                    <div class="tab-content" id="tab-risks" style="display: none;">
                        <!-- Injected -->
                    </div>
                    <div class="tab-content" id="tab-json" style="display: none;">
                        <pre><code id="json-output"></code></pre>
                    </div>

                    <div class="action-bar">
                        <button class="btn-primary" id="download-btn">Export Insight Report</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
