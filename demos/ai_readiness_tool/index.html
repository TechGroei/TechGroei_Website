<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechGroei - AI Readiness Tool</title>
    <meta name="description" content="A practical assessment that turns AI ambition into clear next steps.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon"></div>
                <h1>TechGroei <span class="badge">AI Readiness</span></h1>
            </div>
            <p>Turn AI ambition into clear, practical next steps.</p>
        </header>
        
        <main class="main-content">
            <section class="form-panel">
                <form id="assessment-form">
                    <div class="form-group">
                        <label for="use-case">Describe your AI use case</label>
                        <textarea id="use-case" placeholder="e.g. Process customer emails, classify requests, summarize PDF attachments, and suggest next actions..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>What data is used? (Checklist)</label>
                        <div class="checkbox-group">
                            <label class="custom-checkbox">
                                <input type="checkbox" name="data-source" value="Local files (PDF/Word/Images)">
                                <span class="checkmark"></span>
                                Local files (PDF/Word/Images)
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="data-source" value="Spreadsheets (Excel/CSV)">
                                <span class="checkmark"></span>
                                Spreadsheets & Static Data
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="data-source" value="SaaS/Cloud Apps (CRM, ERP)">
                                <span class="checkmark"></span>
                                SaaS / Connected Apps (CRM, ERP)
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="data-source" value="Relational/NoSQL Databases">
                                <span class="checkmark"></span>
                                Direct Database Access
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Governance & Privacy Profile</label>
                        <div class="checkbox-group">
                            <label class="custom-checkbox">
                                <input type="checkbox" name="gov-risk" value="PII">
                                <span class="checkmark"></span>
                                Contains Personal or Sensitive Data (PII)
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="gov-risk" value="NoReview">
                                <span class="checkmark"></span>
                                Fully Automated (No human review of output)
                            </label>
                            <label class="custom-checkbox">
                                <input type="checkbox" name="gov-risk" value="HighRiskAI">
                                <span class="checkmark"></span>
                                Qualifies as High-Risk under EU AI Act
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Where will the system run?</label>
                        <div class="radio-group">
                            <label class="custom-radio">
                                <input type="radio" name="hosting" value="cloud-api" checked>
                                <span class="radiomark"></span>
                                Cloud LLM APIs (OpenAI, Anthropic, Gemini)
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="hosting" value="private-cloud">
                                <span class="radiomark"></span>
                                Private Enterprise Cloud (Azure OpenAI, AWS)
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="hosting" value="on-premises">
                                <span class="radiomark"></span>
                                On-Premises / Local Hardware Model
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>What happens if the AI output is wrong?</label>
                        <div class="radio-group">
                            <label class="custom-radio">
                                <input type="radio" name="failure-impact" value="low" checked>
                                <span class="radiomark"></span>
                                Low Factor (Internal rework, minor delay)
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="failure-impact" value="medium">
                                <span class="radiomark"></span>
                                Medium Factor (Client-facing error, moderate fix)
                            </label>
                            <label class="custom-radio">
                                <input type="radio" name="failure-impact" value="high">
                                <span class="radiomark"></span>
                                High Factor (Legal, financial, or reputational damage)
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">
                        <span class="btn-text">Generate Assessment Report</span>
                        <span class="btn-icon">→</span>
                    </button>
                </form>
            </section>

            <section class="report-panel">
                <div class="report-placeholder" id="report-placeholder">
                    <div class="placeholder-icon">📋</div>
                    <p>Fill out the assessment form to generate a practical, actionable AI readiness report.</p>
                </div>
                
                <div class="report-content" id="report-content" style="display: none;">
                    <div class="report-header">
                        <h2>Assessment Report</h2>
                        <div class="score-ring">
                            <svg viewBox="0 0 36 36" class="circular-chart">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" id="score-circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage" id="score-text">0%</text>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="report-body" id="report-body-content">
                        <!-- Content injected via JS -->
                    </div>

                    <div class="report-actions">
                        <button id="download-btn" class="btn-secondary">Download Report (MD)</button>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
